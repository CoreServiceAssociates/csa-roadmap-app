<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Business Roadmap | CoreService Associates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green:        #0b8927;
    --green-light:  #f0faf3;
    --green-mid:    #097a22;
    --green-border: #c3e6cc;
    --navy:         #003366;
    --text:         #1c2b3a;
    --muted:        #6b7a8d;
    --border:       #e2e6ea;
    --bg:           #f7f8fa;
    --white:        #ffffff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────────── */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    height: 42px; width: 42px;
    border-radius: 50%;
    border: 1.5px solid var(--green-border);
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; color: var(--green);
    flex-shrink: 0; letter-spacing: -0.5px;
  }

  .header-text .org { font-size: 14px; font-weight: 700; color: var(--navy); }
  .header-text .tag { font-size: 11.5px; color: var(--muted); }

  /* ── Loading screen ───────────────────────────────────────── */
  #loading-screen {
    min-height: calc(100vh - 71px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 24px;
  }

  .loading-spinner {
    width: 52px; height: 52px;
    border: 3px solid var(--green-border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    text-align: center;
  }

  .loading-text h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .loading-msg {
    font-size: 14.5px;
    color: var(--muted);
    min-height: 22px;
    transition: opacity 0.4s;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }

  .loading-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-border);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { background: var(--green-border); transform: scale(1); }
    40% { background: var(--green); transform: scale(1.3); }
  }

  /* ── Results page ─────────────────────────────────────────── */
  #results-screen { display: none; }

  .results-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .results-eyebrow {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    background: var(--green-light);
    border: 1px solid var(--green-border);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .results-heading {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }

  .results-intro {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 600px;
  }

  /* ── Step cards ───────────────────────────────────────────── */
  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 16px;
  }

  .step-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px 26px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .step-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .step-num {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--green-light);
    border: 1.5px solid var(--green-border);
    color: var(--green);
    font-size: 12px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .step-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.3;
  }

  .step-guidance {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 10px;
    padding-left: 42px;
  }

  .step-why {
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
    padding-left: 42px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }

  .step-why::before {
    content: '→';
    flex-shrink: 0;
  }

  /* ── Step 4 (CTA card) ────────────────────────────────────── */
  .step-card-cta {
    background: var(--green);
    border: none;
    border-radius: 12px;
    padding: 28px 26px;
    box-shadow: 0 4px 20px rgba(11,137,39,0.2);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .step-card-cta.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .step-card-cta .step-num {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  .step-card-cta .step-title {
    color: #fff;
  }

  .step-card-cta .step-guidance {
    color: rgba(255,255,255,0.9);
  }

  /* ── Error screen ─────────────────────────────────────────── */
  #error-screen {
    display: none;
    min-height: calc(100vh - 71px);
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .error-box {
    max-width: 440px;
  }

  .error-box h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
  }

  .error-box p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 20px;
  }

  .retry-btn {
    display: inline-block;
    padding: 11px 24px;
    background: var(--green);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }

  /* ── Debug panel ──────────────────────────────────────────── */
  #debug-panel {
    display: none;
    background: #1e1e1e;
    color: #00ff88;
    font-family: monospace;
    font-size: 12px;
    padding: 20px 24px;
    white-space: pre-wrap;
    word-break: break-all;
    border-top: 2px solid #00ff88;
    margin-top: 40px;
  }

  @media (max-width: 600px) {
    .results-heading { font-size: 22px; }
    .results-wrap { padding: 32px 18px 60px; }
    .step-card, .step-card-cta { padding: 20px 18px; }
    .step-guidance, .step-why, .cta-btn { padding-left: 0; margin-left: 0; }
    .cta-btn { display: block; text-align: center; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="header">
  <div class="logo-mark">CS</div>
  <div class="header-text">
    <div class="org">CoreService Associates</div>
    <div class="tag">A Team Behind Your Business</div>
  </div>
</header>

<!-- ── Loading screen ──────────────────────────────────────── -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">
    <h2>Building your roadmap…</h2>
    <p class="loading-msg" id="loading-msg">Reading your business details</p>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- ── Results screen ──────────────────────────────────────── -->
<div id="results-screen">
  <div class="results-wrap">
    <span class="results-eyebrow">Your Personal Roadmap</span>
    <h1 class="results-heading" id="results-heading">Here's your next right move.</h1>
    <p class="results-intro" id="results-intro"></p>

    <div class="steps-list" id="steps-list"></div>
  </div>
</div>

<!-- ── Error screen ─────────────────────────────────────────── -->
<div id="error-screen">
  <div class="error-box">
    <h2>Something went wrong</h2>
    <p id="error-msg">We weren't able to generate your roadmap. Please try again — it only takes a moment.</p>
    <button class="retry-btn" onclick="history.back()">← Go Back & Try Again</button>
  </div>
</div>

<!-- ── Debug panel ───────────────────────────────────────────── -->
<div id="debug-panel"></div>

<script>
(function () {

  // ── Read URL params ───────────────────────────────────────
  var params = new URLSearchParams(window.location.search);

  var am_id           = params.get('am_id')           || '';
  var firstName       = params.get('firstName')       || 'there';
  var bizName         = params.get('bizName')         || '';
  var email           = params.get('email')           || '';
  var phone           = params.get('phone')           || '';
  var bizDesc         = params.get('bizDesc')         || '';
  var challenge       = params.get('challenge')       || '';
  var stage           = params.get('stage')           || '';
  var partnerName = params.get('partnerName') || 'CoreService Associates';
  var debugMode   = params.get('debug')       === 'true';

  // ── Debug helpers ─────────────────────────────────────────
  function dbg(label, data) {
    if (!debugMode) return;
    console.log('[CSA results]', label, data);
    var panel = document.getElementById('debug-panel');
    panel.style.display = 'block';
    panel.textContent += '\n[' + label + ']\n' + JSON.stringify(data, null, 2) + '\n';
  }

  dbg('Params loaded', {
    am_id: am_id,
    firstName: firstName,
    bizName: bizName,
    email: email,
    phone: phone,
    bizDesc: bizDesc,
    challenge: challenge,
    stage: stage,
    partnerName: partnerName
  });

  // ── Loading messages ──────────────────────────────────────
  var loadingMessages = [
    'Reading your business details…',
    'Thinking through your stage and goals…',
    'Crafting steps specific to you…',
    'Almost ready…'
  ];
  var msgIndex = 0;
  var msgEl = document.getElementById('loading-msg');

  var msgInterval = setInterval(function () {
    msgIndex = (msgIndex + 1) % loadingMessages.length;
    msgEl.style.opacity = '0';
    setTimeout(function () {
      msgEl.textContent = loadingMessages[msgIndex];
      msgEl.style.opacity = '1';
    }, 400);
  }, 2600);

  // ── Show error ────────────────────────────────────────────
  function showError(msg) {
    clearInterval(msgInterval);
    document.getElementById('loading-screen').style.display = 'none';
    var errorScreen = document.getElementById('error-screen');
    errorScreen.style.display = 'flex';
    if (msg) document.getElementById('error-msg').textContent = msg;
    dbg('Error shown', { msg: msg });
  }

  // ── Stagger-animate cards into view ──────────────────────
  function revealCards() {
    var cards = document.querySelectorAll('.step-card, .step-card-cta');
    cards.forEach(function (card, i) {
      setTimeout(function () {
        card.classList.add('visible');
      }, i * 160);
    });
  }

  // ── Render roadmap results ────────────────────────────────
  function renderRoadmap(data) {
    clearInterval(msgInterval);

    // Heading
    document.getElementById('results-heading').textContent =
      firstName !== 'there'
        ? firstName + ', here\u2019s your roadmap.'
        : 'Here\u2019s your roadmap.';

    // Intro
    document.getElementById('results-intro').textContent = data.intro || '';

    var list = document.getElementById('steps-list');
    list.innerHTML = '';

    // Steps 1–3 (AI generated)
    data.steps.forEach(function (step, i) {
      var card = document.createElement('div');
      card.className = 'step-card';
      card.innerHTML =
        '<div class="step-header">' +
          '<div class="step-num">0' + (i + 1) + '</div>' +
          '<div class="step-title">' + escHtml(step.title) + '</div>' +
        '</div>' +
        '<p class="step-guidance">' + escHtml(step.guidance) + '</p>' +
        '<p class="step-why">' + escHtml(step.whyNow) + '</p>';
      list.appendChild(card);
    });

    // Step 4 — always hardcoded CTA
    var ctaCard = document.createElement('div');
    ctaCard.className = 'step-card-cta';
    ctaCard.innerHTML =
      '<div class="step-header">' +
        '<div class="step-num">04</div>' +
        '<div class="step-title">Connect with ' + escHtml(partnerName) + '</div>' +
      '</div>' +
      '<p class="step-guidance">' +
        'You\u2019ve got your first three moves \u2014 and you don\u2019t have to figure out the rest alone. ' +
        escHtml(partnerName) + ' is a local CoreService partner who already knows your market. ' +
        'A free check-in takes 20 minutes and costs nothing. Come as you are.' +
      '</p>';
    list.appendChild(ctaCard);

    // Show results, hide loading
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('results-screen').style.display = 'block';

    // Stagger cards in
    setTimeout(revealCards, 80);

    dbg('Roadmap rendered', { steps: data.steps.length, partnerName: partnerName });
  }

  // ── HTML escape helper ────────────────────────────────────
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Build AI prompt ───────────────────────────────────────
  function buildPrompt() {
    var stageLabel = {
      'just-starting':    'just starting out (under 1 year)',
      'getting-traction': 'getting traction (1–3 years)',
      'established':      'established (3+ years)'
    }[stage] || stage;

    return [
      'You are a warm, practical business advisor for CoreService Associates.',
      'A small business owner has submitted their information. Generate a personalized 3-step business roadmap for them.',
      '',
      'BUSINESS DETAILS:',
      '- Name: ' + firstName,
      '- Business: ' + (bizName || 'not provided'),
      '- Description: ' + bizDesc,
      '- Stage: ' + stageLabel,
      '- Biggest challenge: ' + (challenge || 'not specified'),
      '',
      'INSTRUCTIONS:',
      '- Generate exactly 3 steps. Do not generate a 4th step.',
      '- Every step must be SPECIFIC to their business type, stage, and challenge.',
      '- Do not give generic advice. If they run a mobile pet grooming service, mention pet grooming specifically.',
      '- Write like a trusted neighbor who runs a business — warm, direct, practical. Not consultant-speak.',
      '- Each step should be something they can start this week.',
      '',
      'RESPOND WITH ONLY VALID JSON. No markdown. No preamble. No explanation outside the JSON.',
      '',
      'Required format:',
      '{',
      '  "intro": "2 sentences personalizing the roadmap to their specific situation.",',
      '  "steps": [',
      '    {',
      '      "title": "Short action title — 5 to 7 words",',
      '      "guidance": "2 sentences of specific, practical guidance tailored to their business.",',
      '      "whyNow": "One short encouraging sentence about why this matters right now."',
      '    }',
      '  ]',
      '}'
    ].join('\n');
  }

  // ── Call Anthropic API via proxy ──────────────────────────
  async function generateRoadmap() {
    var prompt = buildPrompt();
    dbg('Prompt built', { prompt: prompt });

    try {
      var res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        var errText = await res.text();
        dbg('API error response', { status: res.status, body: errText });
        throw new Error('API returned ' + res.status);
      }

      var data = await res.json();
      dbg('Raw API response', data);

      var raw = (data.content && data.content[0] && data.content[0].text) || '';
      dbg('Raw text from API', { raw: raw });

      // Strip any accidental markdown fences
      var clean = raw.replace(/```json|```/g, '').trim();

      var parsed = JSON.parse(clean);
      dbg('Parsed roadmap JSON', parsed);

      if (!parsed.steps || parsed.steps.length === 0) {
        throw new Error('No steps in response');
      }

      renderRoadmap(parsed);

    } catch (err) {
      dbg('generateRoadmap error', { message: err.message, stack: err.stack });
      showError('We weren\'t able to generate your roadmap. Please go back and try again.');
    }
  }

  // ── Validate we have enough data to proceed ───────────────
  if (!bizDesc) {
    showError('Missing business information. Please go back and fill out the form.');
    return;
  }

  // ── Kick it off ───────────────────────────────────────────
  generateRoadmap();

})();
</script>

</body>
</html>
